<body>
<div class="nav"><a href="index.html" class="logo">re9guide<span>.it.com</span></a><a href="index.html" style="color:#b0a09a;text-decoration:none;margin-left:auto;">← All guides</a></div>

<script>
let searchIndex = [];
let selectedIdx = -1;

fetch('/search-index.json')
  .then(r => r.json())
  .then(data => { searchIndex = data; render(''); });

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const tokens = query.toLowerCase().split(/\s+/).filter(t => t.length >= 2);
  let result = escapeHtml(text);
  for (const tok of tokens) {
    const re = new RegExp('(' + tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  }
  return result;
}

function score(item, query) {
  if (!query) return 0;
  const q = query.toLowerCase();
  const title = item.title.toLowerCase();
  const desc = item.desc.toLowerCase();
  const url = item.url.toLowerCase();
  let s = 0;
  // Title exact match
  if (title.includes(q)) s += 100;
  // URL slug match
  if (url.includes(q.replace(/\s+/g, '-'))) s += 80;
  // Title token matches
  const tokens = q.split(/\s+/).filter(t => t.length >= 2);
  for (const t of tokens) {
    if (title.includes(t)) s += 30;
    if (desc.includes(t)) s += 10;
    if (url.includes(t)) s += 15;
  }
  return s;
}

function render(query) {
  query = query.trim();
  const resultsDiv = document.getElementById('results');
  const statsDiv = document.getElementById('stats');
  if (!query) {
    if (activeCategory !== 'all') {
      // show category browsing mode
      const catItems = searchIndex.filter(item => item.category === activeCategory).slice(0, 30);
      statsDiv.textContent = 'Browsing: ' + activeCategory + ' (' + catItems.length + ' shown)';
      resultsDiv.innerHTML = catItems.map(item => {
        const langClass = item.lang === 'ko' ? 'lang-ko' : 'lang-en';
        const langLabel = item.lang === 'ko' ? 'KO' : 'EN';
        return '<div class="result"><a class="result-title" href="' + item.url + '"><span class="cat-badge">' + (item.category||'Guide') + '</span>' + escapeHtml(item.title) +
          '<span class="lang-badge ' + langClass + '">' + langLabel + '</span></a>' +
          '<div class="result-url">' + item.url + '</div>' +
          '<div class="result-desc">' + escapeHtml(item.desc || '') + '</div></div>';
      }).join('');
      return;
    }
    statsDiv.textContent = searchIndex.length + ' pages indexed · type to search or filter by category';
    resultsDiv.innerHTML = '';
    return;
  }
  const scored = searchIndex
    .map(item => ({ item, score: score(item, query) }))
    .filter(x => x.score > 0)
    .filter(x => activeCategory === 'all' || x.item.category === activeCategory)
    .sort((a, b) => b.score - a.score)
    .slice(0, 30);

  statsDiv.textContent = scored.length + ' results for "' + query + '"';
  if (!scored.length) {
    resultsDiv.innerHTML = '<div class="empty">No results. Try a different keyword.</div>';
    return;
  }
  resultsDiv.innerHTML = scored.map((x, i) => {
    const item = x.item;
    const langClass = item.lang === 'ko' ? 'lang-ko' : 'lang-en';
    const langLabel = item.lang === 'ko' ? 'KO' : 'EN';
    return '<div class="result" data-idx="' + i + '">' +
      '<a class="result-title" href="' + item.url + '"><span class="cat-badge">' + (item.category||'Guide') + '</span>' + highlight(item.title, query) +
      '<span class="lang-badge ' + langClass + '">' + langLabel + '</span></a>' +
      '<div class="result-url">' + item.url + '</div>' +
      '<div class="result-desc">' + highlight(item.desc, query) + '</div>' +
      '</div>';
  }).join('');
}

const box = document.getElementById('search-box');
box.addEventListener('input', e => render(e.target.value));
box.addEventListener('keydown', e => {
  if (e.key === 'Escape') { box.value = ''; render(''); }
});

document.querySelectorAll('.shortcuts a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const q = a.dataset.query;
    box.value = q;
    box.focus();
    render(q);
  });
});

// Pre-populate from URL ?q= param
const params = new URLSearchParams(window.location.search);
if (params.get('q')) {
  box.value = params.get('q');
  render(box.value);
}
</script>
